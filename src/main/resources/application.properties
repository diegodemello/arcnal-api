spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
api.security.token.secret=${JWT_SECRET}

file.max-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

storage.s3-endpoint=${STORAGE_S3_ENDPOINT}
storage.s3-access-key=${STORAGE_S3_ACCESS_KEY}
storage.s3-secret-access-key=${STORAGE_S3_SECRET_ACCESS_KEY}
storage.container-name=${STORAGE_S3_BUCKET_NAME}
storage.public-url=${STORAGE_S3_PUBLIC_URL}
resend.api-key=${RESEND_API_KEY}

management.endpoints.web.exposure.include=health,info,metrics,prometheus